<div class="page-header">
    <div class="header-left">
        <h1 class="page-title">Person Enquiry</h1>
        <nav class="breadcrumb">
            <span class="breadcrumb-item">Enquiry</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item">Person Enquiry</span>
        </nav>
    </div>
</div>

<div class="main-container">
    <div class="form-row">
        <div class="form-group">
            <label>Enquiry Type</label>
            <select class="form-control" [(ngModel)]="selectedType" (ngModelChange)="search()">
                <option value="">All</option>
                <option *ngFor="let t of enquiryTypes" [value]="t">{{t}}</option>
            </select>
        </div>
        <div class="form-group">
            <label>Name</label>
            <input class="form-control" [(ngModel)]="nameQuery" (ngModelChange)="search()" placeholder="Enter name" />
        </div>
    </div>

    <div class="table-wrapper" *ngIf="results.length">
        <table class="table">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>ID</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let r of results">
                    <td>{{r.type}}</td>
                    <td>{{r.name}}</td>
                    <td>{{r.contact}}</td>
                    <td>{{r.memberId || r.subscriberId || r.agentId}}</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div class="empty-state" *ngIf="!results.length">
        <p>Use the form above to search for a person.</p>
    </div>
</div>
