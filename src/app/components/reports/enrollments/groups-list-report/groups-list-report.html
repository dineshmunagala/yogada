<div class="page-header">
    <div class="header-left">
        <h1 class="page-title">Groups List Report</h1>
        <nav class="breadcrumb">
            <span class="breadcrumb-item">Admin</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item">Reports</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item">Enrollments</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item active">Groups List Report</span>
        </nav>
    </div>
</div>

<div class="main-container">
    <div class="form-section">
        <form [formGroup]="reportForm" (ngSubmit)="onGenerate()">
            <div class="form-grid">
                <div class="form-group">
                    <label for="groupType">Group Type *</label>
                    <select id="groupType" class="form-control" formControlName="groupType">
                        <option value="">Select Group Type</option>
                        <option value="Running">Running</option>
                        <option value="Closed">Closed</option>
                        <option value="Both">Both</option>
                    </select>
                    <div class="error-message" *ngIf="submitted && reportForm.get('groupType')?.invalid">
                        Group Type is required
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Generate</button>
                <button type="button" class="btn btn-secondary" (click)="onClear()">Clear</button>
            </div>
        </form>
    </div>

    <!-- Groups Table -->
    <div class="groups-section" *ngIf="showGroups">
        <div class="section-header">
            <h3>Groups List ({{groups.length}} groups)</h3>
        </div>
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Group Name</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Members</th>
                        <th>Amount</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let group of groups">
                        <td>{{group.id}}</td>
                        <td>{{group.name}}</td>
                        <td>{{group.type}}</td>
                        <td>{{group.status}}</td>
                        <td>{{group.members}}</td>
                        <td>{{group.amount}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
