<div class="page-header">
  <div class="header-left">
    <div class="page-title">Dividend List For Month</div>
    <nav class="breadcrumb">
      <span class="breadcrumb-item">Dashboard</span>
      <span class="breadcrumb-separator">→</span>
      <span class="breadcrumb-item">Reports</span>
      <span class="breadcrumb-separator">→</span>
      <span class="breadcrumb-item">Auctions</span>
      <span class="breadcrumb-separator">→</span>
      <span class="breadcrumb-item active">Dividend List For Month</span>
    </nav>
  </div>
</div>
<div class="main-container">
  <form [formGroup]="dividendForm" (ngSubmit)="onGenerate()" class="form-section">
    <div class="form-grid">
      <div class="form-group">
        <label>Report Order <span class="required">*</span></label>
        <select formControlName="order" class="form-control">
          <option value="">Select order</option>
          <option *ngFor="let o of orders" [value]="o">{{ o }}</option>
        </select>
        <div class="error-message" *ngIf="submitted && dividendForm.get('order')?.invalid">Order is required.</div>
      </div>
      <div class="form-group">
        <label>Month <span class="required">*</span></label>
        <select formControlName="month" class="form-control">
          <option value="">Select month</option>
          <option *ngFor="let m of months" [value]="m">{{ m }}</option>
        </select>
        <div class="error-message" *ngIf="submitted && dividendForm.get('month')?.invalid">Month is required.</div>
      </div>
      <div class="form-group">
        <label>Year <span class="required">*</span></label>
        <select formControlName="year" class="form-control">
          <option value="">Select year</option>
          <option *ngFor="let y of years" [value]="y">{{ y }}</option>
        </select>
        <div class="error-message" *ngIf="submitted && dividendForm.get('year')?.invalid">Year is required.</div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Generate</button>
      <button type="button" class="btn btn-primary" (click)="onPrint()" [disabled]="!showResults()">Print</button>
    </div>
  </form>

  <div class="table-section" *ngIf="showResults()">
    <div class="section-header">Dividend List</div>
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Order</th>
            <th>Month</th>
            <th>Year</th>
            <th>Subscriber</th>
            <th>Dividend Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of results()">
            <td>{{ row.order }}</td>
            <td>{{ row.month }}</td>
            <td>{{ row.year }}</td>
            <td>{{ row.subscriber }}</td>
            <td>{{ row.amount | number:'1.2-2' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
