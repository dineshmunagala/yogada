<div class="login-container">
  <!-- Left Side - Login Form -->
  <div class="login-left">
    <div class="login-card">
      <div class="card-header">
        <h1>Log in</h1>
        <p>Enter your email to receive a one time passcode</p>
      </div>

      <div class="role-selector">
        <button [class.active]="selectedRole === 'Admin'" (click)="setRole('Admin')">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Admin
        </button>
        <button [class.active]="selectedRole === 'User'" (click)="setRole('User')">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          User
        </button>
      </div>
      
      <form class="login-form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Email / Phone</label>
          <input type="text" id="email" [(ngModel)]="email" name="email" placeholder="7732370237" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••••"
            required />
        </div>

        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
            <span class="checkbox-custom"></span>
            <span class="checkbox-label">Remember me for 30 days</span>
          </label>
        </div>

        <button type="submit" class="btn-verify">
          Verify
        </button>
      </form>

      <div class="card-footer">
        <p>Don't have an account? <a href="#" class="contact-link">Contact Admin</a></p>
      </div>
    </div>
  </div>

  <!-- Right Side - Branding & Illustration -->
  <div class="login-right">
    <div class="right-header">
      <div class="logo-brand">
        <img src="assets/images/cloudlogo.png" height="50px" alt="cloudlogo" />
      </div>
      <a href="#" class="visit-website">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
        </svg>
        Visit Website
      </a>
    </div>

    <div class="login-right-container">
      <img src="assets/images/login-image.png" alt="Login Illustration" class="login-illustration" />
    </div>

    <div class="right-content">
      <h2 class="tagline">Your Chit Fund. Automated. Organized. Stress-Free.</h2>
      <p class="description">From member onboarding to auctions and collections, streamline every step with real-time
        accuracy</p>
    </div>
  </div>
</div>
