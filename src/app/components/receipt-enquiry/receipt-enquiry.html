<div class="page-header">
  <div class="header-left">
    <h1 class="page-title">Receipt Enquiry</h1>
    <nav class="breadcrumb">
      <span class="breadcrumb-item">Enquiry</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item">Receipt Enquiry</span>
    </nav>
  </div>
</div>

<div class="main-container">
  <div class="form-filter">
    <div class="form-group">
      <label>Receipt Type</label>
      <select class="form-control" [(ngModel)]="selectedType" (ngModelChange)="search()">
        <option value="">Any</option>
        <option *ngFor="let t of receiptTypes" [value]="t">{{t}}</option>
      </select>
    </div>
    <div class="form-group">
      <label>Series</label>
      <input class="form-control" [(ngModel)]="seriesQuery" (ngModelChange)="search()" placeholder="Enter series" />
    </div>
    <div class="form-group">
      <label>Number</label>
      <input class="form-control" [(ngModel)]="numberQuery" (ngModelChange)="search()" placeholder="Enter number" />
    </div>
  </div>

  <div class="table-wrapper" *ngIf="results.length">
    <table class="table">
      <thead>
        <tr>
          <th>Type</th>
          <th>Series</th>
          <th>Number</th>
          <th>Date</th>
          <th>Amount</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of results">
          <td>{{r.type}}</td>
          <td>{{r.series}}</td>
          <td>{{r.number}}</td>
          <td>{{r.date}}</td>
          <td>{{r.amount}}</td>
          <td>{{r.description}}</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div *ngIf="!results.length">
    <p>Use the form above to search for a receipt.</p>
  </div>
</div>
