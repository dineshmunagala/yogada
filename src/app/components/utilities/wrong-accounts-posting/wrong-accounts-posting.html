<div class="page-header">
    <div class="header-left">
        <h1 class="page-title">Wrong Accounts Posting</h1>
        <nav class="breadcrumb">
            <span class="breadcrumb-item">Admin</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item">Utilities</span>
            <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
            <span class="breadcrumb-item active">Wrong Accounts Posting</span>
        </nav>
    </div>
</div>

<div class="main-container">
    <div class="form-section">
        <form [formGroup]="searchForm" (ngSubmit)="onRetrieve()">
            <div class="form-grid">
                <div class="form-group">
                    <label for="postingType">Posting Type *</label>
                    <select id="postingType" class="form-control" formControlName="postingType">
                        <option value="">Select Posting Type</option>
                        <option value="Monthly">Monthly</option>
                        <option value="Quarterly">Quarterly</option>
                        <option value="Yearly">Yearly</option>
                    </select>
                    <div class="error-message" *ngIf="submitted && searchForm.get('postingType')?.invalid">
                        Posting Type is required
                    </div>
                </div>
                <div class="form-group">
                    <label for="year">Year *</label>
                    <input type="number" id="year" class="form-control" formControlName="year"
                        placeholder="Enter year" />
                    <div class="error-message" *ngIf="submitted && searchForm.get('year')?.invalid">
                        <span *ngIf="searchForm.get('year')?.errors?.['required']">Year is required</span>
                        <span *ngIf="searchForm.get('year')?.errors?.['pattern']">Year must be a 4-digit number</span>
                    </div>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Retrieve</button>
                <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
            </div>
        </form>
    </div>

    <!-- Records Table -->
    <div class="records-section" *ngIf="showRecords">
        <div class="section-header">
            <h3>Wrong Posting Records ({{records.length}} found)</h3>
        </div>
        <div class="table-wrapper">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Account</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Issue</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let record of records">
                        <td>{{record.id}}</td>
                        <td>{{record.account}}</td>
                        <td>{{record.amount}}</td>
                        <td>{{record.date}}</td>
                        <td>{{record.issue}}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
