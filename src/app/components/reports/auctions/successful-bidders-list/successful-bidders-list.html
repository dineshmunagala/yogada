<div class="page-header">
  <div class="header-left">
    <h1 class="page-title">Successful Bidders List</h1>
    <nav class="breadcrumb">
      <span class="breadcrumb-item">Admin</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item">Reports</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item">Auctions</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item active">Successful Bidders List</span>
    </nav>
  </div>
</div>

<div class="main-container">
  <div class="form-section">
    <form [formGroup]="biddersForm" (ngSubmit)="onGenerate()" class="report-form">
      <div class="form-grid">
        <div class="form-group">
          <label>Month *</label>
          <select formControlName="month" class="form-control">
            <option value="" disabled>Select Month</option>
            <option *ngFor="let m of months" [value]="m">{{ m }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year *</label>
          <select formControlName="year" class="form-control">
            <option value="" disabled>Select Year</option>
            <option *ngFor="let y of years" [value]="y">{{ y }}</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Generate</button>
      </div>
    </form>
  </div>

  <div class="table-section" *ngIf="showResults()">
    <div class="section-header">
      <h3>Successful Bidders List</h3>
    </div>
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Order</th>
            <th>Month</th>
            <th>Year</th>
            <th>Chit Group</th>
            <th>Bidder</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let b of bidders()">
            <td>{{ b.order }}</td>
            <td>{{ b.month }}</td>
            <td>{{ b.year }}</td>
            <td>{{ b.chitGroup }}</td>
            <td>{{ b.bidder }}</td>
            <td>{{ b.amount | number }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
