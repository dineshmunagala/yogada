<div class="page-header">
  <div class="header-left">
    <h1 class="page-title">Accounts</h1>
    <nav class="breadcrumb">
      <span class="breadcrumb-item">Master</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item">Accounts</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator" /></span>
      <span class="breadcrumb-item active">Accounts</span>
    </nav>
  </div>
  <button class="btn btn-primary btn-add" (click)="toggleForm()">+ Add Accounts</button>
</div>

<div class="ledger-account-entry">
  <div class="table-section" *ngIf="!showForm">
    <div class="section-header">
      <h3>Account Lists</h3>
      <div class="search-box">
        <span class="search-icon">
          <img src="assets/images/icons/Search.png" alt="Search" />
        </span>
        <input type="text" placeholder="Search" class="search-input" [(ngModel)]="searchTerm" (input)="filterLedgers()" />
        <span class="search-shortcut">Ctrl Shift K</span>
      </div>
    </div>
    <div *ngIf="filteredLedgers.length>0" class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Group</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let l of filteredLedgers">
            <td>{{l.name}}</td>
            <td>{{l.group}}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="filteredLedgers.length===0" class="empty-state">
      <p>No ledgers yet. Click "Add Ledger" to create one.</p>
    </div>
  </div>

  <div class="add-entry-form" *ngIf="showForm">
    <div class="form-container">
      <div class="form-content">
        <div class="form-header">
          <h2>Add Ledger Account</h2>
          <button class="close-btn" (click)="toggleForm()">×</button>
        </div>
        <div class="form-body">
          <div *ngIf="errorMessage" class="error-message">{{errorMessage}}</div>
          <div *ngIf="successMessage" class="success-message">{{successMessage}}</div>

          <div class="form-row">
            <div class="form-group">
              <label for="acctName">Account Name <span class="text-danger">*</span></label>
              <input id="acctName" type="text" [(ngModel)]="newLedger.name" name="acctName" class="form-control" />
            </div>
            <div class="form-group">
              <label for="acctGroup">Account Group <span class="text-danger">*</span></label>
              <select id="acctGroup" [(ngModel)]="newLedger.group" name="acctGroup" class="form-control">
                <option value="">-- select group --</option>
                <option *ngFor="let g of groups" [value]="g">{{g}}</option>
              </select>
            </div>
          </div>

          <div class="section-divider"></div>
          <h4>Address Details</h4>
          <div class="form-row">
            <div class="form-group"><label>Person Name</label><input type="text" [(ngModel)]="newLedger.person" name="person" class="form-control" /></div>
            <div class="form-group"><label>Address</label><input type="text" [(ngModel)]="newLedger.address" name="address" class="form-control" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Pin Code</label><input type="text" [(ngModel)]="newLedger.pincode" name="pincode" class="form-control" /></div>
            <div class="form-group"><label>Email</label><input type="email" [(ngModel)]="newLedger.email" name="email" class="form-control" /></div>
            <div class="form-group"><label>Mobile</label><input type="text" [(ngModel)]="newLedger.mobile" name="mobile" class="form-control" /></div>
          </div>

          <div class="section-divider"></div>
          <h4>Tax Details</h4>
          <div class="form-row">
            <div class="form-group"><label>HSN Code</label><input type="text" [(ngModel)]="newLedger.hsn" name="hsn" class="form-control" /></div>
            <div class="form-group"><label>TIN Number</label><input type="text" [(ngModel)]="newLedger.tin" name="tin" class="form-control" /></div>
            <div class="form-group"><label>MFL Number</label><input type="text" [(ngModel)]="newLedger.mfl" name="mfl" class="form-control" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>GST Number</label><input type="text" [(ngModel)]="newLedger.gst" name="gst" class="form-control" /></div>
            <div class="form-group"><label>PAN Number</label><input type="text" [(ngModel)]="newLedger.pan" name="pan" class="form-control" /></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>IGST %</label><input type="number" [(ngModel)]="newLedger.igst" name="igst" class="form-control" /></div>
            <div class="form-group"><label>CGST %</label><input type="number" [(ngModel)]="newLedger.cgst" name="cgst" class="form-control" /></div>
            <div class="form-group"><label>SGST %</label><input type="number" [(ngModel)]="newLedger.sgst" name="sgst" class="form-control" /></div>
          </div>

        </div>
        <div class="form-footer">
          <button class="btn btn-secondary" (click)="toggleForm()">Cancel</button>
          <button class="btn btn-primary" (click)="saveLedger()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>
