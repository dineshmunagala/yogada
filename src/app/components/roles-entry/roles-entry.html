<div class="page-header">
  <div class="header-left">
    <h1 class="page-title">Roles Entry</h1>
    <nav class="breadcrumb">
      <span class="breadcrumb-item">Security</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator"/></span>
      <span class="breadcrumb-item">Roles</span>
      <span class="breadcrumb-separator"><img src="assets/images/icons/bredcrum.png" alt="Separator"/></span>
      <span class="breadcrumb-item active">Roles Entry</span>
    </nav>
  </div>
  <button class="btn btn-primary btn-add" (click)="toggleForm()">+ Add Role</button>
</div>

<div class="main-container">
  <div class="table-section" *ngIf="!showForm">
    <div class="section-header">
      <h3>Roles List</h3>
      <div class="search-box">
        <span class="search-icon"><img src="assets/images/icons/Search.png" alt="Search"/></span>
        <input type="text" placeholder="Search" class="search-input" [(ngModel)]="searchTerm" (input)="filterRoles()"/>
        <span class="search-shortcut">Ctrl Shift K</span>
      </div>
    </div>
    <div class="table-wrapper">
      <table class="table" *ngIf="filteredRoles.length">
        <thead>
          <tr><th>Role Name</th><th>Description</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of filteredRoles">
            <td>{{r.name}}</td><td>{{r.description}}</td>
          </tr>
        </tbody>
      </table>
      <div class="empty-state" *ngIf="!filteredRoles.length">
        <p>No roles defined yet. Click "Add Role" to create one.</p>
      </div>
    </div>
  </div>

  <div class="add-entry-form" *ngIf="showForm">
    <div class="form-card">
      <div class="form-header">
        <h2>Create Role</h2>
        <button class="close-btn" (click)="toggleForm()">×</button>
      </div>
      <div class="form-body">
        <div class="form-row">
          <div class="form-group"><label>Role Name *</label><input class="form-control" [(ngModel)]="newRole.name" placeholder="Enter role name"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Role Description</label><textarea class="form-control" [(ngModel)]="newRole.description" placeholder="Describe the role" style="resize: vertical; min-height: 60px;"></textarea></div>
        </div>
        <div class="form-footer">
          <button class="btn btn-secondary" (click)="toggleForm()">Cancel</button>
          <button class="btn btn-primary" (click)="saveRole()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>
